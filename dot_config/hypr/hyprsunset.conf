# hyprsunset — blue-light filter via the hyprland-ctm-control protocol.
# Preferred over shader-based tools (hyprshade): the filter is applied in the
# compositor, so it is NOT captured by screenshots / screen recordings.
#
# Profiles activate at their `time` and reset every option set by other
# profiles. On startup the currently-active profile is applied.
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprsunset/

# Daytime: neutral, no filter (06:00 -> 17:00).
profile {
    time = 06:00
    temperature = 6500
}

# Evening/night: warm (17:00 -> 06:00). Lower temperature == warmer.
profile {
    time = 17:00
    temperature = 4000
}
